name: Auto-Track Containers

on:
  # Every Wednesday at 08:00 NZT (= Tuesday 20:00 UTC)
  schedule:
    - cron: '0 20 * * 2'

  # Manual trigger from the Actions tab
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — run tracking but do NOT commit results'
        type: boolean
        default: false

permissions:
  contents: write   # needed to commit auto-tracking.json back to the repo

jobs:
  track:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run tracking script
        env:
          # Maersk / ANL  →  https://developer.maersk.com (free)
          MAERSK_CLIENT_ID:     ${{ secrets.MAERSK_CLIENT_ID }}
          MAERSK_CLIENT_SECRET: ${{ secrets.MAERSK_CLIENT_SECRET }}

          # CMA CGM / ANL  →  https://api-portal.cma-cgm.com (free trial)
          CMACGM_API_KEY:       ${{ secrets.CMACGM_API_KEY }}

          # Hapag-Lloyd  →  https://api-portal.hlag.com (free)
          HLAG_CLIENT_ID:       ${{ secrets.HLAG_CLIENT_ID }}
          HLAG_CLIENT_SECRET:   ${{ secrets.HLAG_CLIENT_SECRET }}

          # MSC  →  https://developerportal.msc.com (free)
          MSC_API_KEY:          ${{ secrets.MSC_API_KEY }}

          # Sinay universal API (covers 170+ carriers: ONE, Evergreen, Yang Ming, COSCO, ZIM, PIL, HMM …)
          # Register free: https://app.sinay.ai
          SINAY_API_KEY:        ${{ secrets.SINAY_API_KEY }}

        run: python scripts/track.py

      - name: Show results summary
        if: always()
        run: |
          if [ -f public/auto-tracking.json ]; then
            echo "=== Tracking Results ==="
            python3 -c "
          import json
          with open('public/auto-tracking.json') as f:
              d = json.load(f)
          print(f'Updated at  : {d[\"updatedAt\"]}')
          print(f'Containers  : {d[\"containerCount\"]}')
          print(f'Auto-tracked: {d[\"trackedCount\"]}')
          results = d['results']
          by_source = {}
          for r in results.values():
              s = r.get('source') or ('Error' if r.get('error') else 'Unknown')
              by_source[s] = by_source.get(s, 0) + 1
          for src, cnt in sorted(by_source.items()):
              print(f'  {src}: {cnt}')
          errors = [(cid, r['error']) for cid, r in results.items() if r.get('error')]
          if errors:
              print(f'Errors ({len(errors)}):')
              for cid, e in errors[:15]:
                  print(f'  - {cid[:8]}... {e}')
          "
          fi

      - name: Commit and push results
        if: ${{ !inputs.dry_run }}
        run: |
          git config user.name  "Container Tracker Bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/auto-tracking.json data/containers.json 2>/dev/null || true
          git diff --staged --quiet \
            && echo "No changes to commit — all statuses are unchanged." \
            || (git commit -m "chore: auto-tracking update $(date -u +%Y-%m-%dT%H:%M:%SZ)" && git push)
