name: Auto-Track Containers

on:
  # Every 4 hours (6 times per day)
  # API rate limit budget per run (free tiers):
  #   Sinay:       ~500/day  → 6 runs × 30 containers = 180/day  ✓
  #   Maersk:      ~25/day   → only called for Maersk/ANL containers ✓
  #   CMA CGM:     ~200/day  → 6 × CMA containers ✓
  #   Hapag-Lloyd: ~100/day  → 6 × HL containers ✓
  #   MSC:         ~200/day  → 6 × MSC containers ✓
  schedule:
    - cron: '0 */4 * * *'

  # Manual / on-demand trigger (from app "Check All Now" button or Actions tab)
  workflow_dispatch:
    inputs:
      force_all:
        description: 'Force re-check all containers (ignore recently-checked)'
        type: boolean
        default: false
      dry_run:
        description: 'Dry run — do not commit results'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  track:
    runs-on: ubuntu-latest
    timeout-minutes: 15   # Sinay free-tier CT lookups can take up to 90s each

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run tracking script
        env:
          MAERSK_CLIENT_ID:     ${{ secrets.MAERSK_CLIENT_ID }}
          MAERSK_CLIENT_SECRET: ${{ secrets.MAERSK_CLIENT_SECRET }}
          CMACGM_API_KEY:       ${{ secrets.CMACGM_API_KEY }}
          HLAG_CLIENT_ID:       ${{ secrets.HLAG_CLIENT_ID }}
          HLAG_CLIENT_SECRET:   ${{ secrets.HLAG_CLIENT_SECRET }}
          MSC_API_KEY:          ${{ secrets.MSC_API_KEY }}
          SINAY_API_KEY:        ${{ secrets.SINAY_API_KEY }}
          FORCE_ALL:            ${{ inputs.force_all || 'false' }}
        run: python scripts/track.py

      - name: Show results summary
        if: always()
        run: |
          if [ -f public/auto-tracking.json ]; then
            python3 -c "
          import json
          with open('public/auto-tracking.json') as f:
              d = json.load(f)
          print(f'Updated:    {d[\"updatedAt\"]}')
          print(f'Containers: {d[\"containerCount\"]}')
          print(f'Tracked:    {d[\"trackedCount\"]}')
          print(f'Skipped:    {d.get(\"skippedCount\", 0)} (recently checked)')
          by_src = {}
          for r in d['results'].values():
              s = r.get('source') or ('Error' if r.get('error') else 'Skipped')
              by_src[s] = by_src.get(s, 0) + 1
          for src, cnt in sorted(by_src.items()):
              print(f'  {src}: {cnt}')
          errors = [(k, r['error']) for k, r in d['results'].items() if r.get('error')]
          if errors:
              print(f'Errors ({len(errors)}):')
              for k, e in errors[:10]: print(f'  {k[:8]}... {e}')
          "
          fi

      - name: Commit and push results
        if: ${{ !inputs.dry_run }}
        run: |
          git config user.name  "Container Tracker Bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/auto-tracking.json data/containers.json 2>/dev/null || true
          git diff --staged --quiet \
            && echo "No changes." \
            || (git commit -m "chore: auto-tracking $(date -u +%Y-%m-%dT%H:%M:%SZ)" && git push)
