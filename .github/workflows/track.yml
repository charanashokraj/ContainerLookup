name: Auto-Track Containers

on:
  # Every Wednesday at 08:00 NZT (= Monday 20:00 UTC)
  schedule:
    - cron: '0 20 * * 2'

  # Also allow manual runs from the Actions tab
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (do not commit results)'
        type: boolean
        default: false

permissions:
  contents: write   # needed to commit auto-tracking.json back to the repo

jobs:
  track:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run tracking script
        env:
          MAERSK_CLIENT_ID: ${{ secrets.MAERSK_CLIENT_ID }}
          MAERSK_CLIENT_SECRET: ${{ secrets.MAERSK_CLIENT_SECRET }}
        run: python scripts/track.py

      - name: Show results summary
        run: |
          if [ -f public/auto-tracking.json ]; then
            echo "=== Tracking Results ==="
            python3 -c "
          import json
          with open('public/auto-tracking.json') as f:
              d = json.load(f)
          print(f'Updated at: {d[\"updatedAt\"]}')
          print(f'Containers: {d[\"containerCount\"]}')
          print(f'Auto-tracked: {d[\"trackedCount\"]}')
          errors = [r.get(\"error\") for r in d[\"results\"].values() if r.get(\"error\")]
          if errors:
              print(f'Errors ({len(errors)}):')
              for e in errors[:10]:
                  print(f'  - {e}')
          "
          fi

      - name: Commit and push results
        if: ${{ !inputs.dry_run }}
        run: |
          git config user.name  "Container Tracker Bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/auto-tracking.json data/containers.json 2>/dev/null || true
          git diff --staged --quiet && echo "No changes to commit." || \
            git commit -m "chore: auto-tracking update $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
